name: hilal-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: "hilal"
      POSTGRES_PASSWORD: "changeme"
      POSTGRES_DB: "hilal"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bridge
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hilal" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    networks:
      - bridge
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    image: ghcr.io/akramboussanni/belagirkahoot-backend:main
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bridge
      - web
    environment:
      PORT: "${PORT:-8080}"
      DATABASE_URL: "${DATABASE_URL:-postgres://hilal:changeme@postgres:5432/hilal?sslmode=disable}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      AI_RATE_LIMIT_PER_HOUR: "${AI_RATE_LIMIT_PER_HOUR:-5}"
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-noreply@hilal.app}"
    expose:
      - "8080"

  frontend:
    image: ghcr.io/akramboussanni/belagirkahoot-frontend:main
    restart: always
    depends_on:
      - backend
    networks:
      - web
    ports:
      - "80:80"
      - "443:443"

volumes:
  pgdata:
  redisdata:


networks:
  bridge:
    driver: bridge
  web:
    external: true
